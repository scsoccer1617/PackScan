<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="hsl(262 82% 56%)"/>
      <stop offset="50%" stop-color="hsl(224 86% 52%)"/>
      <stop offset="100%" stop-color="hsl(188 82% 48%)"/>
    </linearGradient>
    <linearGradient id="rainbow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FF3FA4" stop-opacity="0.9"/>
      <stop offset="25%"  stop-color="#FFD23F" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#3FE0C3" stop-opacity="0.9"/>
      <stop offset="75%"  stop-color="#6B9CFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#C8A0FF" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="shine" cx="0.3" cy="0.2" r="0.7">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.24"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- iOS expects a square; iOS applies the rounded mask automatically, but we include one so non-iOS uses look right -->
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  <!-- Soft corner-light for depth -->
  <rect width="180" height="180" rx="40" fill="url(#shine)"/>

  <!-- Scan line: a slim holographic ribbon behind the glyph -->
  <g opacity="0.85">
    <rect x="20" y="86" width="140" height="8" rx="4" fill="url(#rainbow)"/>
    <rect x="20" y="86" width="140" height="8" rx="4" fill="#FFFFFF" opacity="0.12"/>
  </g>

  <!-- The bold P — scaled up from the 48-unit glyph (3.75x, origin 0,0) -->
  <g transform="translate(52.5, 37.5) scale(3.75)">
    <path fill="#FFFFFF" fill-rule="evenodd" clip-rule="evenodd"
      d="M0 0 h14 a9 9 0 0 1 0 18 h-6 v10 h-8 V0 z M8 7 v4 h6 a2 2 0 0 0 0 -4 h-6 z"/>
  </g>

  <!-- Scan line foreground cap on either side (on top of P, hint of the beam passing through) -->
  <g opacity="0.7">
    <rect x="20" y="86" width="24" height="8" rx="4" fill="#FFFFFF"/>
    <rect x="136" y="86" width="24" height="8" rx="4" fill="#FFFFFF"/>
  </g>
</svg>
